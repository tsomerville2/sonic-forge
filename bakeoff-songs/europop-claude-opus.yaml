title: Starlight Dreams
bpm: 138
sections:
  - say: "In the glow of distant stars, we find ourselves"
    cycles: 2
    layers:
      - synth: pad
        notes: c4 eb4 g4
      - mini: "bd*4"
      - mini: "~ hh ~ hh"

  - say: "Dancing through the cosmos, hearts on fire"
    cycles: 3
    layers:
      - synth: saw
        notes: c3 eb3 f3 g3
        fast: 8
      - synth: bass
        notes: c2
      - mini: "bd ~ bd ~"
      - mini: "~ ~ sn ~"
      - mini: "hh*8"

  - say: "We are light, we are love, we are infinite"
    cycles: 3
    layers:
      - synth: pluck
        notes: g4 eb4 c4 g4
        fast: 16
      - synth: pad
        notes: eb4 g4
      - mini: "bd*4"
      - mini: "~ ~ cp ~"
      - mini: "hh(7,8)"

  - say: "The universe breathes through us"
    cycles: 2
    layers:
      - synth: acid
        notes: c3 eb3 g3 c4
        fast: 16
      - synth: bass
        notes: c2 c2 eb2 f2
      - mini: "bd ~ bd bd"
      - mini: "~ ~ sn ~"
      - mini: "oh(3,8)"

  - say: "Forever shining, forever free"
    cycles: 2
    layers:
      - synth: pad
        notes: c4 g4 c5
      - synth: pluck
        notes: c5
      - mini: "bd*2"
