meta:
  name: sonic-forge
  mcp_server: prodboost
  description: Audio production suite — songs, speech, talking heads, effects
settings:
  trigger_words:
  - sonic-forge
  - sing
  - music
  - droid
  - speak
  trigger_threshold: 0.3
  ambient_threshold: 0.45
  embedding_model: BAAI/bge-small-en-v1.5
  embedding_threshold: 0.78
  llm_fallback: true
  llm_provider: auto
nudge:
  tag: sonic-forge-hook
  preamble: 'IMPORTANT: The user''s request matches a sonic-forge tool.

    Call the tool below. Do NOT use Bash, Read, Grep, or Agent for this.

    Audio production suite — songs, speech, talking heads, effects'
  call_prefix: mcp__prodboost__
journeys:
  make_speak:
    tool: sonic-forge speak
    params: {}
    description: Speak say narrate text-to-speech TTS voice. Low quality macOS say
      or high quality Kokoro voice. Optional background music from DSL templates at
      low or medium quality. Briefing narration droid comms show dialogue. Read this
      to me. Audio briefing podcast summary. Captain's briefing mission brief spoken
      report. Say something aloud announce. Voice synthesis speech generation.
    triggers:
    - say this out loud
    - speak this
    - read this to me
    - text to speech
    - narrate this
    - make it talk
    - announce this
    - give me an audio briefing
    - spoken summary
    - brief me
    - mission briefing
    - read me the status
    - podcast style summary
    - voice summary
    - catch me up out loud
    - news brief
    - debrief me
    - narrate a summary
    - audio report
    - talk to me computer
    - say this in kokoro
    - high quality speech
    - quick say
    - sonic-forge speak
  make_instrumental:
    tool: sonic-forge beat
    params: {}
    description: Generate instrumental music with no vocals. Low quality bytebeat 8-bit
      retro chiptune. Medium quality ChucK synthesizer ambient drone dark techno space
      synth coding flow. High quality ACE-Step instrumental no vocals full production.
      Background music coding vibes. Create a beat. Generate a track. Make instrumental
      music. Compose background audio.
    triggers:
    - make some instrumental music
    - generate a beat
    - make background music
    - create an instrumental
    - bytebeat something
    - 8-bit music
    - chiptune track
    - make a chuck song
    - ambient drone
    - dark techno instrumental
    - space synth
    - coding flow music
    - generate a retro beat
    - make some coding vibes
    - instrumental track
    - compose a beat
    - sonic-forge beat
    - make me a lo-fi beat
    - create some background audio
    - synth track
    - no vocals just music
    - pure instrumental
  make_sing:
    tool: sonic-forge sing
    params: {}
    description: Generate a real song with singing vocals using ACE-Step. Radio quality
      album quality full production with real human-sounding voice. Lyrics chorus verse
      bridge. Suno quality AI music generation. All genres rock pop folk country jazz
      metal electronic indie bluegrass hiphop ambient. Option for a cappella vocals
      only no instruments. The only engine that actually sings.
    triggers:
    - sing me a song
    - make a song about
    - generate a song with vocals
    - sing something
    - I want a real song
    - make me a song with lyrics
    - sonic-forge sing
    - write and sing a song
    - album quality song
    - radio quality track
    - full production song
    - a cappella vocals
    - vocals only no instruments
    - make a pop song
    - make a rock song
    - make a country song
    - sing about
    - ACE-Step song
    - song with chorus and verse
    - europop banger
    - folk song about
    - hiphop track with vocals
    - metal song
    - jazz tune with singing
    - sing this as a song
    - real singing voice
  animate_lip_sync:
    tool: sonic-forge speak
    params:
      visual: droid
    description: Attach talking head animation to audio. Animated character lip synced
      to speech or song. Droid alien human avatar speaking. Pixel art character animation.
      Visual narration with animated face. Make a talking droid alien human for the
      show. Video with speaking character. Any audio plus animated character on top.
    triggers:
    - make a talking head
    - talking droid
    - animate this with a character
    - lip sync a character
    - put a talking head on this
    - make the droid talk
    - talking alien
    - droid pixel animation
    - visual briefing with character
    - animated narrator
    - I want a talking robot
    - let the droid present this
    - put a face on this
    - droid for my show
    - make a character deliver this
    - talking avatar
    - animate a narrator
    - droid explainer video
    - character lip sync
  apply_sound_effects:
    tool: sonic-forge robotize
    params: {}
    description: Apply sound effects to audio. Robot voice droid helmet intercom vocoder
      bitcrush ringmod filter. Post-process existing WAV file. Make it sound like a
      robot droid alien cyborg Mandalorian. Voice modulation effects chain. Transform
      audio with effects. Helmet voice intercom radio comms effect.
    triggers:
    - robotize this
    - apply droid effect
    - sonic-forge robotize
    - helmet voice effect
    - intercom effect
    - make it sound like a robot
    - droid voice filter
    - mandalorian voice
    - vocoder effect
    - bitcrush this
    - add effects to this audio
    - robot filter
    - tin can voice
    - radio comms effect
    - transform this audio
    - apply helmet effect
    - process this WAV
  play:
    tool: sonic-forge play
    params: {}
    description: Play existing audio track song music. Replay something already generated.
      Listen to a track from the catalog. Put on coding music. Background music while
      working. Play a ChucK track bytebeat song or rendered composition. Replay a
      briefing or song. Start playback.
    triggers:
    - play some music
    - play a track
    - put on coding music
    - play ambient
    - play trance
    - play dark techno
    - play space synth
    - sonic-forge play
    - play that song
    - replay that
    - listen to a track
    - put on background music
    - play lofi
    - play singing bowls
    - play coding flow
    - start the music
    - jam out
    - play gameboy
    - play bytebeat
    - kick off some tunes
  stop:
    tool: sonic-forge stop
    params: {}
    description: Stop halt silence kill mute all audio playback music sounds. Turn
      off the music. Shut it down. End playback. Quiet everything. Kill the noise.
    triggers:
    - stop the music
    - turn it off
    - shut up
    - silence
    - mute
    - stop playing
    - kill the audio
    - quiet
    - sonic-forge stop
    - kill it
    - enough
    - done listening
    - knock it off
  media_catalog:
    tool: sonic-forge catalog
    params: {}
    description: Browse catalog of available media. List songs tracks characters voices
      templates effects. What do I have. What music is available. What talking heads
      exist. Available voices engines. Show everything. Library inventory. What can
      I play. What characters are installed.
    triggers:
    - what songs do I have
    - show the catalog
    - what music is available
    - sonic-forge catalog
    - what can I play
    - list all tracks
    - what characters do I have
    - available voices
    - list templates
    - what talking heads exist
    - show my library
    - what's available
    - inventory
    - browse my collection
    - what effects are there
  design_song_template:
    tool: sonic-forge dsl
    params: {}
    description: Creative session designing new song templates. Write music in YAML
      DSL format. Compose new ChucK pieces. Create bytebeat formulas. Song format
      reference guide. Synths notes mini-notation. Iterate on a new composition.
      Audition and refine. Build a new template. Music production songwriting session.
    triggers:
    - design a new song
    - create a song template
    - I want to compose something new
    - sonic-forge dsl
    - song format reference
    - write a new ChucK piece
    - make a new bytebeat formula
    - creative music session
    - compose a new template
    - how do I write a song
    - music DSL reference
    - let's make something new musically
    - songwriting session
    - new beat template
    - iterate on a composition
  design_character_sprite_template:
    tool: sonic-forge character
    params: {}
    description: Creative session designing new talking head characters. Make a new
      droid alien human character for the show. Generate or import a spritesheet.
      Design a visual character. Create a new talking head avatar. Character design
      workshop. Spritesheet creation. New droid for my show.
    triggers:
    - make a new character
    - design a talking head
    - create a new droid
    - sonic-forge character
    - new character for my show
    - design a sprite
    - generate a spritesheet
    - character design session
    - I need a new droid
    - make an alien character
    - create a new avatar
    - design a new talking head
    - character workshop
    - new visual character
  design_sound_effect_template:
    tool: sonic-forge robotize
    params: {}
    description: Creative session designing new sound effect chains. Create a new voice
      effect preset. Design a custom robotize chain. Build a new audio effect template.
      Experiment with effect combinations. New helmet variant. Custom droid voice.
      Effect design workshop. Sound design session.
    triggers:
    - design a new effect
    - create an effect preset
    - new voice effect
    - custom robotize chain
    - effect design session
    - experiment with effects
    - make a new helmet variant
    - custom droid voice design
    - sound design workshop
    - new effect template
    - build an effect chain
