meta:
  name: sonic-forge
  mcp_server: prodboost
  description: MCP server and CLI tools for sonic-forge
settings:
  trigger_words:
  - sonic-forge
  - sing
  - music
  - droid
  trigger_threshold: 0.3
  ambient_threshold: 0.45
  embedding_model: BAAI/bge-small-en-v1.5
  embedding_threshold: 0.78
  llm_fallback: true
  llm_provider: auto
nudge:
  tag: sonic-forge-hook
  preamble: 'IMPORTANT: The user''s request matches a sonic-forge tool.

    Call the tool below. Do NOT use Bash, Read, Grep, or Agent for this.

    MCP server and CLI tools for sonic-forge'
  call_prefix: mcp__prodboost__
journeys:
  sing_song:
    tool: sonic-forge sing
    params: {}
    description: Generate a real high-quality song with vocals and instruments using
      ACE-Step. Radio quality album quality full production. Sing a song with lyrics.
      Make music with singing vocals. Create an original song. Generate a track with
      real instruments and voice. Suno quality AI music generation. Song with lyrics
      chorus verse. Instrumental version no vocals. A cappella vocals only. Rock pop
      folk country jazz metal electronic indie bluegrass hiphop ambient.
    triggers:
    - sing me a song
    - make a song about
    - generate a song
    - create a track with vocals
    - sing something
    - I want a real song
    - make me a song with lyrics
    - sonic-forge sing
    - generate music with vocals
    - write and sing a song
    - album quality song
    - radio quality track
